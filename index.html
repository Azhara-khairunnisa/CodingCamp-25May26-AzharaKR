<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense & Budget Visualizer</title>

  <!-- Tailwind CSS v4 (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- Chart.js for pie chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

  <style type="text/tailwindcss">
    @theme {
      --color-primary: #3498db;
      --color-primary-dark: #1a3a5c;
      --color-card: #1e3a5f;
      --color-card-hover: #24487a;
      --color-danger: #e74c3c;
    }
  </style>
</head>

<body class="min-h-screen bg-blue-100 font-sans">

  <!-- ── HEADER ── -->
  <header class="bg-[#1a3a5c] shadow-lg py-6">
    <h1 class="text-center text-3xl font-bold text-white tracking-wide">
      💰 Expense &amp; Budget Visualizer
    </h1>
  </header>

  <!-- ── MAIN CONTENT ── -->
  <main class="max-w-5xl mx-auto px-4 py-8 space-y-6">

    <!-- Total Balance Card -->
    <section class="bg-[#1e3a5f] rounded-2xl shadow-xl p-6 text-center">
      <p class="text-blue-300 uppercase tracking-widest text-sm font-semibold mb-1">Total Balance</p>
      <h2 id="balance" class="text-5xl font-extrabold text-[#3498db]">$0.00</h2>
    </section>

    <!-- Add Transaction Form -->
    <section class="bg-[#1e3a5f] rounded-2xl shadow-xl p-6">
      <h3 class="text-white text-xl font-semibold mb-4">Add Transaction</h3>
      <form id="transactionForm" class="grid grid-cols-1 sm:grid-cols-2 gap-4">

        <!-- Item Name -->
        <div class="flex flex-col gap-1">
          <label for="itemName" class="text-blue-200 text-sm font-medium">Item Name</label>
          <input
            type="text"
            id="itemName"
            placeholder="e.g. Lunch, Bus ticket…"
            required
            class="rounded-lg bg-[#24487a] text-white placeholder-blue-300 border border-blue-700 focus:outline-none focus:ring-2 focus:ring-[#3498db] px-4 py-2"
          />
        </div>

        <!-- Amount -->
        <div class="flex flex-col gap-1">
          <label for="amount" class="text-blue-200 text-sm font-medium">Amount ($)</label>
          <input
            type="number"
            id="amount"
            placeholder="0.00"
            step="0.01"
            min="0.01"
            required
            class="rounded-lg bg-[#24487a] text-white placeholder-blue-300 border border-blue-700 focus:outline-none focus:ring-2 focus:ring-[#3498db] px-4 py-2"
          />
        </div>

        <!-- Category -->
        <div class="flex flex-col gap-1">
          <label for="category" class="text-blue-200 text-sm font-medium">Category</label>
          <select
            id="category"
            required
            class="rounded-lg bg-[#24487a] text-white border border-blue-700 focus:outline-none focus:ring-2 focus:ring-[#3498db] px-4 py-2"
          >
            <option value="" disabled selected>Select Category</option>
            <option value="Food">🍔 Food</option>
            <option value="Transport">🚌 Transport</option>
            <option value="Fun">🎉 Fun</option>
          </select>
        </div>

        <!-- Submit Button -->
        <div class="flex items-end">
          <button
            type="submit"
            class="w-full bg-[#3498db] hover:bg-blue-500 active:bg-blue-700 text-white font-semibold rounded-lg px-6 py-2 transition-colors duration-200 shadow-md"
          >
            + Add Transaction
          </button>
        </div>

      </form>
    </section>

    <!-- Transactions + Chart (side by side on desktop) -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

      <!-- Transaction List -->
      <section class="bg-[#1e3a5f] rounded-2xl shadow-xl p-6 flex flex-col">
        <h3 class="text-white text-xl font-semibold mb-4">Transactions</h3>
        <div
          id="transactionList"
          class="flex-1 overflow-y-auto max-h-80 space-y-3 pr-1"
        >
          <p id="emptyMsg" class="text-blue-300 text-sm text-center mt-8">No transactions yet. Add one above!</p>
        </div>
      </section>

      <!-- Pie Chart -->
      <section class="bg-[#1e3a5f] rounded-2xl shadow-xl p-6 flex flex-col items-center">
        <h3 class="text-white text-xl font-semibold mb-4 self-start">Spending by Category</h3>
        <div class="relative w-full max-w-xs mx-auto">
          <canvas id="expenseChart"></canvas>
          <p id="chartEmpty" class="text-blue-300 text-sm text-center mt-4">Chart will appear once you add transactions.</p>
        </div>
      </section>

    </div>
  </main>

  <!-- ── JAVASCRIPT ── -->
  <script>
    // ── State ──────────────────────────────────────────────────────────────
    let transactions = JSON.parse(localStorage.getItem('transactions') || '[]');
    let chart = null;

    const categoryEmoji = { Food: '🍔', Transport: '🚌', Fun: '🎉' };
    const categoryColors = {
      Food:      '#3498db',
      Transport: '#2ecc71',
      Fun:       '#e67e22',
    };

    // ── DOM refs ───────────────────────────────────────────────────────────
    const form            = document.getElementById('transactionForm');
    const itemNameInput   = document.getElementById('itemName');
    const amountInput     = document.getElementById('amount');
    const categorySelect  = document.getElementById('category');
    const balanceEl       = document.getElementById('balance');
    const listEl          = document.getElementById('transactionList');
    const emptyMsg        = document.getElementById('emptyMsg');
    const chartEmpty      = document.getElementById('chartEmpty');

    // ── Helpers ────────────────────────────────────────────────────────────
    function save() {
      localStorage.setItem('transactions', JSON.stringify(transactions));
    }

    function formatCurrency(n) {
      return '$' + Number(n).toFixed(2);
    }

    // ── Render balance ─────────────────────────────────────────────────────
    function renderBalance() {
      const total = transactions.reduce((sum, t) => sum + t.amount, 0);
      balanceEl.textContent = formatCurrency(total);
    }

    // ── Render list ────────────────────────────────────────────────────────
    function renderList() {
      // Remove existing transaction items (keep emptyMsg)
      listEl.querySelectorAll('.tx-item').forEach(el => el.remove());

      if (transactions.length === 0) {
        emptyMsg.classList.remove('hidden');
        return;
      }
      emptyMsg.classList.add('hidden');

      // Render newest first
      [...transactions].reverse().forEach(tx => {
        const item = document.createElement('div');
        item.className = 'tx-item flex items-center justify-between bg-[#24487a] rounded-xl px-4 py-3 shadow';
        item.innerHTML = `
          <div class="flex flex-col">
            <span class="text-white font-semibold">${escapeHtml(tx.name)}</span>
            <span class="text-blue-300 text-xs mt-0.5">${categoryEmoji[tx.category] || ''} ${tx.category}</span>
          </div>
          <div class="flex items-center gap-3">
            <span class="text-[#3498db] font-bold text-lg">${formatCurrency(tx.amount)}</span>
            <button
              data-id="${tx.id}"
              class="delete-btn bg-[#e74c3c] hover:bg-red-400 text-white text-xs font-semibold rounded-lg px-3 py-1.5 transition-colors duration-150"
            >Delete</button>
          </div>
        `;
        listEl.appendChild(item);
      });
    }

    // ── Render chart ───────────────────────────────────────────────────────
    function renderChart() {
      const totals = {};
      transactions.forEach(tx => {
        totals[tx.category] = (totals[tx.category] || 0) + tx.amount;
      });

      const labels = Object.keys(totals);
      const data   = Object.values(totals);
      const colors = labels.map(l => categoryColors[l] || '#8e44ad');

      if (labels.length === 0) {
        chartEmpty.classList.remove('hidden');
        if (chart) { chart.destroy(); chart = null; }
        return;
      }
      chartEmpty.classList.add('hidden');

      const ctx = document.getElementById('expenseChart').getContext('2d');
      if (chart) chart.destroy();

      chart = new Chart(ctx, {
        type: 'pie',
        data: {
          labels,
          datasets: [{
            data,
            backgroundColor: colors,
            borderColor: '#1e3a5f',
            borderWidth: 3,
          }]
        },
        options: {
          plugins: {
            legend: {
              position: 'bottom',
              labels: { color: '#bfdbfe', font: { size: 13 }, padding: 16 }
            },
            tooltip: {
              callbacks: {
                label: ctx => ` ${ctx.label}: ${formatCurrency(ctx.parsed)}`
              }
            }
          }
        }
      });
    }

    // ── Full render ────────────────────────────────────────────────────────
    function render() {
      renderBalance();
      renderList();
      renderChart();
    }

    // ── Add transaction ────────────────────────────────────────────────────
    form.addEventListener('submit', e => {
      e.preventDefault();
      const name     = itemNameInput.value.trim();
      const amount   = parseFloat(amountInput.value);
      const category = categorySelect.value;

      if (!name || isNaN(amount) || amount <= 0 || !category) return;

      transactions.push({ id: Date.now(), name, amount, category });
      save();
      render();

      // Reset form
      itemNameInput.value  = '';
      amountInput.value    = '';
      categorySelect.value = '';
    });

    // ── Delete transaction (event delegation) ─────────────────────────────
    listEl.addEventListener('click', e => {
      const btn = e.target.closest('.delete-btn');
      if (!btn) return;
      const id = Number(btn.dataset.id);
      transactions = transactions.filter(t => t.id !== id);
      save();
      render();
    });

    // ── XSS helper ────────────────────────────────────────────────────────
    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Init ───────────────────────────────────────────────────────────────
    render();
  </script>

</body>
</html>
